<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./01_squidGame.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>

</head>
<body>
    <div class="bg-contain">
        <header>
            <div class="logo">
                <img src="./images//sqlogowhite.png" alt="">
            </div>
            <ul class="items">
                <li>About</li>
                <li>Watch now</li>
                <li>Actors</li>
                <li>Contact</li>
            </ul>
            <i class="ri-menu-4-fill"></i>
        </header>
        <main class="squid-main">
            <div class="squid-container">
                <div class="squid-game">
                    <img src="./images//sq.png" alt="logo">
                    <p>Action/Thriller/Drama Series directed by Dong-Hyuk Kwang <br> Season 1:9 Episodes</p>
                    <div class="squid-btn">
                        <div class="play">
                            <i class="ri-play-circle-fill"></i>
                            <button class="play-btn">Play Now</button>
                        </div>
                        <div class="watch">
                            <i class="ri-play-line"></i>
                            <button class="watch-btn">Watch Trailer</button>
                        </div>
                    </div>

                </div>
                <!-- <div class="squid-game2">
                    
                </div> -->
                <div class="squid-game1">
                    <div class="scroll-line">
                        <p>SCROLL</p>
                        <hr>
                    </div>
                    <div class="masked-man">
                        <img src="./images//charactor.png" alt="">
                    </div>
                    <div class="main-social-icon">
                        <i class="ri-twitter-line"></i>
                        <i class="ri-instagram-line"></i>
                        <i class="ri-facebook-line"></i>
                    </div>
                </div>
            </div>
        </main>
        <section class="trailer-collect">
            <div class="trailer">
                <img src="./images//sqtrailer0.jpg" alt="">
                <i class="ri-play-circle-fill"></i>
            </div>
            <div class="trailer">
                <img src="./images//sqtrailer.jpg" alt="">
                <i class="ri-play-circle-fill"></i>
            </div>
            <div class="trailer">
                <img src="./images//sqtrailer2.jpg" alt="">
                <i class="ri-play-circle-fill"></i>
            </div>
        </section>
    </div>
    
</body>
</html>
